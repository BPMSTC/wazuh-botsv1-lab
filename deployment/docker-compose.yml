version: "3.8"

services:
  wazuh.manager:
    volumes:
      - ../wazuh/local_decoder.xml:/var/ossec/etc/decoders/local_decoder.xml:ro
      - ../wazuh/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro

  wazuh.replay-agent:
    image: wazuh/wazuh-agent:${WAZUH_VERSION:-4.14.4}
    container_name: wazuh.replay-agent
    hostname: wazuh.replay-agent
    restart: unless-stopped
    environment:
      - WAZUH_MANAGER_SERVER=wazuh.manager
      - WAZUH_AGENT_GROUP=default
    volumes:
      - ./config/wazuh-agent/ossec.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - ../replay/output:/replay:ro
    depends_on:
      - wazuh.manager
