version: "3.8"

services:
  wazuh.manager:
    image: wazuh/wazuh-manager:${WAZUH_VERSION}
    container_name: wazuh.manager
    hostname: wazuh.manager
    restart: unless-stopped
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    volumes:
      - wazuh_manager_data:/var/ossec/data
      - ../wazuh/local_decoder.xml:/var/ossec/etc/decoders/local_decoder.xml:ro
      - ../wazuh/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro

  wazuh.indexer:
    image: wazuh/wazuh-indexer:${WAZUH_VERSION}
    container_name: wazuh.indexer
    hostname: wazuh.indexer
    restart: unless-stopped
    environment:
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${INDEXER_PASSWORD}
    ports:
      - "9200:9200"

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:${WAZUH_VERSION}
    container_name: wazuh.dashboard
    hostname: wazuh.dashboard
    restart: unless-stopped
    ports:
      - "443:5601"
    environment:
      - INDEXER_USERNAME=${INDEXER_USERNAME}
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=${API_USERNAME}
      - DASHBOARD_PASSWORD=${API_PASSWORD}
    depends_on:
      - wazuh.indexer
      - wazuh.manager

volumes:
  wazuh_manager_data:
